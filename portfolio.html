<!DOCTYPE html>
<html>
<head>
<title>Photography Portfolio</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
body,h1,h2,h3,h4,h5,h6 {font-family: "Lato", sans-serif;}
body, html {
  height: 100%;
  color: #777;
  line-height: 1.8;
}

.w3-wide {letter-spacing: 10px;}
.w3-hover-opacity {cursor: pointer;}

/* Gallery section wrapper */
.gallery-section {
  position: relative;
  text-align: center;
  font-family: Georgia, serif;
}

/* Images fill width, fixed height on mobile */
.gallery-section img {
  width: 100%;
  height: auto;
  display: block;
}

/* Overlay label sits on top of image */
.gallery-overlay {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}

.gallery-overlay.left  { left: 10%; }
.gallery-overlay.right { right: 10%; }

.gallery-overlay p {
  margin: 0;
  color: white;
  font-size: 24px;
}

.gallery-overlay button {
  font-size: 24px;
  color: white;
}

/* ── Mobile ── */
@media (max-width: 600px) {
  .gallery-section img {
    height: 220px;
    object-fit: cover;
  }

  /* Hide the absolute overlay on mobile */
  .gallery-overlay {
    display: none;
  }

  /* Show a label bar beneath the image instead */
  .gallery-mobile-label {
    display: block;
    background: #222;
    color: white;
    text-align: center;
    padding: 10px;
    font-size: 18px;
    letter-spacing: 2px;
    text-decoration: none;
  }

  .gallery-mobile-label:hover {
    background: #444;
  }
}

/* Hide mobile labels on larger screens */
@media (min-width: 601px) {
  .gallery-mobile-label {
    display: none;
  }
}
</style>
</head>
<body>

  <!-- Navbar (sit on top) -->
  <div class="w3-top">
    <div class="w3-bar" id="myNavbar">
      <a class="w3-bar-item w3-button w3-hide-medium w3-hide-large w3-right" href="javascript:void(0);" onclick="toggleFunction()" title="Toggle Navigation Menu">
        <i class="fa fa-bars w3-text-black"></i>
      </a>
      <a href="index.html" class="w3-bar-item w3-button w3-text-black">HOME</a>
      <a href="portfolio.html" class="w3-bar-item w3-button w3-hide-small w3-text-black"><i class="fa fa-th"></i> PORTFOLIO</a>
      <a href="https://www.flickr.com/photos/201889971@N03/" class="w3-bar-item w3-button w3-hide-small w3-text-black"> FLICKR</a>
      <a href="https://instagram.com/joegurino" class="w3-bar-item w3-button w3-hide-small w3-text-black"><i class="fa fa-instagram"></i> INSTAGRAM</a>
      <a class="w3-bar-item w3-hide-small w3-right">
        <img class="w3-image w3-right w3-opacity" src="assets/logosmall.png" style="margin:5px" width="35" height="35">
      </a>
    </div>

    <!-- Navbar on small screens -->
    <div id="navDemo" class="w3-bar-block w3-white w3-hide w3-hide-large w3-hide-medium">
      <a href="portfolio.html" class="w3-bar-item w3-button" onclick="toggleFunction()"><i class="fa fa-th"></i> PORTFOLIO</a>
      <a href="https://www.flickr.com/photos/201889971@N03/" class="w3-bar-item w3-button" onclick="toggleFunction()"> FLICKR</a>
      <a href="https://instagram.com/joegurino" class="w3-bar-item w3-button fa fa-instagram" onclick="toggleFunction()"> INSTAGRAM</a>
    </div>
  </div>

  <!-- Aviation -->
  <div class="gallery-section w3-opacity-min" id="aviation">
    <img src="images/parallax/aviation1.png" id="home" alt="Aviation">
    <div class="gallery-overlay left">
      <b><p>AVIATION</p>
      <a href="aviation.html">
        <button class="w3-button w3-padding-large w3-section w3-border w3-border-white">View Gallery</button>
      </a></b>
    </div>
    <a href="aviation.html" class="gallery-mobile-label">AVIATION</a>
  </div>

  <!-- Nature -->
  <div class="gallery-section w3-opacity-min" id="nature">
    <img src="images/parallax/DSC_2853.jpg" alt="Nature">
    <div class="gallery-overlay right">
      <b><p>NATURE</p>
      <a href="nature.html">
        <button class="w3-button w3-padding-large w3-section w3-border w3-border-white">View Gallery</button>
      </a></b>
    </div>
    <a href="nature.html" class="gallery-mobile-label">NATURE</a>
  </div>

  <!-- Animals -->
  <div class="gallery-section w3-opacity-min" id="animals">
    <img src="images/parallax/animal2.png" alt="Animals">
    <div class="gallery-overlay left">
      <b><p>ANIMALS</p>
      <a href="animals.html">
        <button class="w3-button w3-padding-large w3-section w3-border w3-border-white">View Gallery</button>
      </a></b>
    </div>
    <a href="animals.html" class="gallery-mobile-label">ANIMALS</a>
  </div>

  <!-- Astrophotography -->
  <div class="gallery-section w3-opacity-min" id="astro">
    <img src="images/parallax/eclipseparallax.png" alt="Astrophotography">
    <div class="gallery-overlay right">
      <b><p>ASTROPHOTOGRAPHY</p>
      <a href="astro.html">
        <button class="w3-button w3-padding-large w3-section w3-border w3-border-white">View Gallery</button>
      </a></b>
    </div>
    <a href="astro.html" class="gallery-mobile-label">ASTROPHOTOGRAPHY</a>
  </div>

  <!-- Misc -->
  <div class="gallery-section w3-opacity-min" id="misc">
    <img src="images/parallax/misc1.jpg" alt="Misc">
    <div class="gallery-overlay left">
      <b><p>MISC</p>
      <a href="misc.html">
        <button class="w3-button w3-padding-large w3-section w3-border w3-border-white">View Gallery</button>
      </a></b>
    </div>
    <a href="misc.html" class="gallery-mobile-label">MISC</a>
  </div>

<!-- Footer -->
<footer class="w3-center w3-black w3-padding-16">
  <a href="#home" class="w3-button w3-light-grey"><i class="fa fa-arrow-up w3-margin-right"></i>To the top</a>
  <p>Powered by <a href="https://www.w3schools.com/w3css/default.asp" title="W3.CSS" target="_blank" class="w3-hover-text-green">w3.css</a></p>
</footer>

<script>
window.onscroll = function() {myFunction()};
function myFunction() {
    var navbar = document.getElementById("myNavbar");
    if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
        navbar.className = "w3-bar" + " w3-card" + " w3-animate-top" + " w3-white";
    } else {
        navbar.className = navbar.className.replace(" w3-card w3-animate-top w3-white", "");
    }
}

function toggleFunction() {
    var x = document.getElementById("navDemo");
    if (x.className.indexOf("w3-show") == -1) {
        x.className += " w3-show";
    } else {
        x.className = x.className.replace(" w3-show", "");
    }
}
</script>

</body>
</html>
